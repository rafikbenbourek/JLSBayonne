<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="berberPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      
      <!-- Fond -->
      <rect width="100" height="100" fill="#f4efe6"/>

      <!-- Losange central -->
      <polygon points="50,10 90,50 50,90 10,50" fill="none" stroke="#1a1a1a" stroke-width="3"/>

      <!-- Croix berbère -->
      <line x1="50" y1="0" x2="50" y2="100" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="0" y1="50" x2="100" y2="50" stroke="#1a1a1a" stroke-width="2"/>

      <!-- Petits motifs -->
      <circle cx="50" cy="50" r="5" fill="#1a1a1a"/>
      <circle cx="10" cy="10" r="3" fill="#1a1a1a"/>
      <circle cx="90" cy="10" r="3" fill="#1a1a1a"/>
      <circle cx="10" cy="90" r="3" fill="#1a1a1a"/>
      <circle cx="90" cy="90" r="3" fill="#1a1a1a"/>

      <!-- Triangles décoratifs -->
      <polygon points="50,20 60,40 40,40" fill="#1a1a1a"/>
      <polygon points="50,80 60,60 40,60" fill="#1a1a1a"/>

    </pattern>
  </defs>

  <!-- Application du motif -->
  <rect x="0" y="0" width="600" height="600" fill="url(#berberPattern)"/>
</svg>